<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Pages — Redesign</title>
  <link rel="icon" href="assets/fav-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/after.css" />
  <link rel="stylesheet" href="styles/ra-form.css" />
  <link rel="stylesheet" href="styles/pp-public.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="components/icons.js"></script>
  <script type="text/babel" src="components/pp-after.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;
    const PAGES = [['upload', 'Document Upload'], ['consent', 'Change-Request Consent']];
    const STATES = {
      upload: [['ready', 'Ready'], ['uploading', 'Uploading'], ['success', 'Success'], ['invalid', 'Invalid link'], ['ratelimited', 'Rate-limited'], ['error', 'Error']],
      consent: [['ready', 'Ready'], ['submitting', 'Submitting'], ['agreed', 'Agreed'], ['declined', 'Declined'], ['expired', 'Expired'], ['loading', 'Loading'], ['error', 'Invalid link']],
    };

    function App() {
      const [page, setPage] = useState('upload');
      const [state, setState] = useState('ready');
      function pick(p) { setPage(p); setState('ready'); }
      const states = STATES[page];
      return (
        <div className="proto">
          <div className="chrome">
            <div className="chrome__brand"><span className="dot" />Public Pages · Redesign</div>
            <div className="chrome__group">
              <span className="chrome__label">Page</span>
              <div className="seg">
                {PAGES.map(([k, lbl]) => <button key={k} data-active={page === k} onClick={() => pick(k)}>{lbl}</button>)}
              </div>
            </div>
            <div className="chrome__group">
              <span className="chrome__label">State</span>
              <div className="seg">
                {states.map(([k, lbl]) => <button key={k} data-active={state === k} onClick={() => setState(k)}>{lbl}</button>)}
              </div>
            </div>
            <div className="chrome__spacer" />
            <div className="chrome__hint">logged-out · email link</div>
          </div>
          <div className="stage">
            <div className="viewport" key={page + state}>
              <div className="fade-in" data-screen-label={'Public · ' + page + ' · ' + state}>
                {page === 'upload'
                  ? <window.PublicDocumentUpload initial={state} />
                  : <window.PublicConsent initial={state} />}
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
