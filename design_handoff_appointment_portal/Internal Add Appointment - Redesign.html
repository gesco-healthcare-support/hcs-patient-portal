<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Add Appointment — Redesign</title>
  <link rel="icon" href="assets/fav-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/after.css" />
  <link rel="stylesheet" href="styles/ext-home.css" />
  <link rel="stylesheet" href="styles/ra-form.css" />
  <link rel="stylesheet" href="styles/in-shell.css" />

  <style>
    /* embed the wizard inside the staff shell */
    .in-content--flush { padding: 0 0 60px; max-width: none; }
    .in .ra-foot { left: 256px; }
    .in--collapsed .ra-foot { left: 72px; }
    @media (max-width: 860px) { .in .ra-foot { left: 0; } }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="data.js"></script>
  <script src="components/icons.js"></script>
  <script src="components/ra-data.js"></script>

  <script type="text/babel" src="components/after-common.jsx"></script>
  <script type="text/babel" src="components/ra-common.jsx"></script>
  <script type="text/babel" src="components/ra-steps1.jsx"></script>
  <script type="text/babel" src="components/ra-steps2.jsx"></script>
  <script type="text/babel" src="components/ra-after.jsx"></script>
  <script type="text/babel" src="components/in-shell.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    function App() {
      const [flow, setFlow] = useState('appointment'); // appointment | reval
      const [toast, setToast] = useState(null);
      function showToast(m) { setToast(m); clearTimeout(window.__inT); window.__inT = setTimeout(() => setToast(null), 2400); }
      const flowLabel = flow === 'reval' ? 'Re-evaluation' : 'Appointment';

      return (
        <div className="proto">
          <div className="chrome">
            <div className="chrome__brand"><span className="dot" />Internal Add Appointment · Redesign</div>
            <div className="chrome__group">
              <span className="chrome__label">Flow</span>
              <div className="seg">
                <button data-active={flow === 'appointment'} onClick={() => setFlow('appointment')}>Appointment</button>
                <button data-active={flow === 'reval'} onClick={() => setFlow('reval')}>Re-evaluation</button>
              </div>
            </div>
            <div className="chrome__spacer" />
            <div className="chrome__hint">staff books on behalf of a patient</div>
          </div>
          <div className="stage">
            <div className="viewport" key={flow}>
              <div className="fade-in" data-screen-label={'Internal Add · ' + flowLabel}>
                <window.InternalShell roleKey="supervisor" active="add-appt" setActive={() => {}} onToast={showToast} crumb={'New ' + flowLabel.toLowerCase()} contentClass="in-content--flush">
                  <window.AfterRequestAppointment bookerKey="staff" mode={flow} embedded />
                </window.InternalShell>
              </div>
            </div>
          </div>
          {toast && <div className="af-toast"><span className="i" dangerouslySetInnerHTML={window.Ico('check', 17)} />{toast}</div>}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
