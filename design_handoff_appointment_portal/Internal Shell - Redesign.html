<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Shell — Redesign</title>
  <link rel="icon" href="assets/fav-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/after.css" />
  <link rel="stylesheet" href="styles/in-shell.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="components/icons.js"></script>
  <script type="text/babel" src="components/after-common.jsx"></script>
  <script type="text/babel" src="components/in-shell.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;
    const ROLE_LIST = [
      ['itadmin', 'IT Admin'], ['supervisor', 'Staff Supervisor'], ['intake', 'Intake Staff'],
    ];

    function App() {
      const [roleKey, setRoleKey] = useState('supervisor');
      const [active, setActive] = useState('dashboard');
      const [toast, setToast] = useState(null);
      function showToast(m) { setToast(m); clearTimeout(window.__inT); window.__inT = setTimeout(() => setToast(null), 2200); }
      function pickRole(r) { setRoleKey(r); setActive('dashboard'); }

      return (
        <div className="proto">
          <div className="chrome">
            <div className="chrome__brand"><span className="dot" />Internal Shell · Redesign</div>
            <div className="chrome__group">
              <span className="chrome__label">Role</span>
              <div className="seg">{ROLE_LIST.map(([k, lbl]) => <button key={k} data-active={roleKey === k} onClick={() => pickRole(k)}>{lbl}</button>)}</div>
            </div>
            <div className="chrome__spacer" />
            <div className="chrome__hint">sidebar adapts to role · click items</div>
          </div>
          <div className="stage">
            <div className="viewport" key={roleKey}>
              <div className="fade-in" data-screen-label={'Internal Shell · ' + roleKey}>
                <window.InternalShell roleKey={roleKey} active={active} setActive={setActive} onToast={showToast}>
                  <div className="in-placeholder">
                    <div className="ic"><span className="i" dangerouslySetInnerHTML={window.Ico('grid', 28)} /></div>
                    <h2>{(window.IN_ROLES[roleKey].label)} · content area</h2>
                    <p>The shell frames every internal page. Selected: <b>{active}</b>. Pages (Dashboard, Appointments, etc.) render here — designed next in order.</p>
                  </div>
                </window.InternalShell>
              </div>
            </div>
          </div>
          {toast && <div className="af-toast"><span className="i" dangerouslySetInnerHTML={window.Ico('check', 17)} />{toast}</div>}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
