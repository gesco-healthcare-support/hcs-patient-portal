name: Auto PR to Development

# Triggers ONLY when a PR is merged to main (push event = post-merge)
on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    name: 'Auto PR: main -> development'
    # Skip if this is the initial push (no PRs merged yet)
    if: github.event.head_commit.message != '' && !startsWith(github.event.head_commit.message, 'Initial commit')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: check
        run: |
          existing=$(gh pr list --base development --head main --state open --json number -q '.[0].number')
          echo "existing=$existing" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}

      - name: Build PR body
        if: steps.check.outputs.existing == ''
        run: |
          git fetch origin development
          commits=$(git log origin/development..origin/main --oneline --no-merges 2>/dev/null || echo "_(unable to determine)_")
          count=$(echo "$commits" | grep -c . 2>/dev/null || echo "0")
          cat > /tmp/pr-body.md <<EOF
          ## Promotion: main -> development

          **${count} commit(s) to promote:**

          \`\`\`
          ${commits}
          \`\`\`

          Auto-generated after merge to main. Review and merge (merge commit) to promote.
          EOF
          sed -i 's/^          //' /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}

      - name: Create PR
        if: steps.check.outputs.existing == ''
        run: |
          gh pr create \
            --base development \
            --head main \
            --title "ci(sync): promote main to development" \
            --body-file /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
