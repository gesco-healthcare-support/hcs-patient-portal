name: PR Title

# Validates PR titles against Conventional Commits. With squash-merge, the PR
# title becomes the commit message on main -- which is what semantic-release
# reads when deciding version bumps.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  statuses: write

jobs:
  validate:
    name: 'PR Title: Conventional Commits'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
            build
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z0-9].+$
          subjectPatternError: >
            The PR subject must start with an alphanumeric character.
