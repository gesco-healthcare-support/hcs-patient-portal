# Single development compose file (2026-05-06).
#
# This is the only compose file we run; the previous prod/dev split
# (docker-compose.yml + docker-compose.dev.yml overlay) has been folded
# into one. Authserver + API run via `dotnet watch run` from
# Dockerfile.dev with bind-mounted source so C# / Razor edits hot-reload
# without rebuilding the image. Angular runs `ng build --watch` +
# browser-sync from its Dockerfile.dev with bind-mounted source so SPA
# edits live-reload through the browser.
#
# When a production deployment story lands (likely Azure App Service or
# AKS), it will be a separate stack -- not a sibling compose file.

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      # Bind to 127.0.0.1 explicitly to skip Docker Desktop's IPv6 host listener.
      # See docs/plans/deferred-from-mvp.md "W1 bugfix sprint" 2026-04-28.
      - "127.0.0.1:${SQL_HOST_PORT:-1434}:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C -b -o /dev/null
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  # 2026-05-13: MinIO blob store for document uploads. Replaces the
  # DB-BLOB default for the seven per-feature document containers
  # configured in CaseEvaluationDomainModule.ConfigureBlobStoring.
  # Console UI at http://localhost:9001 (creds in MINIO_ROOT_*). MinIO
  # is the chosen blob store for dev and for whatever production
  # destination this stack lands on -- AWS / S3 is explicitly out of
  # scope (Adrian, 2026-05-13).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # One-shot bucket initializer. The MinIO provider has
  # CreateBucketIfNotExists wired (see CaseEvaluationDomainModule) so
  # this is belt-and-suspenders for clarity in logs + to ensure the
  # bucket exists before any upload regardless of which service runs
  # first. Exits as soon as the bucket is present.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      BUCKET_NAME: "${MINIO_BUCKET_NAME:-case-evaluation-documents}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        if ! mc ls "local/$$BUCKET_NAME" >/dev/null 2>&1; then
          mc mb "local/$$BUCKET_NAME"
          echo "Created bucket: $$BUCKET_NAME"
        else
          echo "Bucket exists: $$BUCKET_NAME"
        fi
    restart: "no"

  db-migrator:
    build:
      context: .
      dockerfile: src/HealthcareSupport.CaseEvaluation.DbMigrator/Dockerfile
      args:
        ABP_NUGET_API_KEY: "${ABP_NUGET_API_KEY}"
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=sql-server;Database=${DB_NAME:-CaseEvaluation};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      Redis__Configuration: redis
      OpenIddict__Applications__CaseEvaluation_App__RootUrl: "http://localhost:${NG_PORT:-4200}"
      OpenIddict__Applications__CaseEvaluation_Swagger__RootUrl: "http://localhost:${API_PORT:-44327}"
      # 2026-05-13: MinIO blob storage for the seven document containers
      # (see CaseEvaluationDomainModule.ConfigureBlobStoring). Endpoint
      # uses the docker network alias; AccessKey + SecretKey come from
      # MINIO_ROOT_*. CreateBucketIfNotExists is belt-and-suspenders
      # alongside the minio-init service.
      BlobStoring__Minio__Endpoint: "minio:9000"
      BlobStoring__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      BlobStoring__Minio__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      BlobStoring__Minio__BucketName: "${MINIO_BUCKET_NAME:-case-evaluation-documents}"
      BlobStoring__Minio__WithSsl: "false"
      BlobStoring__Minio__CreateBucketIfNotExists: "true"
    volumes:
      - ./docker/appsettings.secrets.json:/app/appsettings.secrets.json:ro
      - ${HOME}/.abp/cli:/root/.abp/cli:ro
    depends_on:
      sql-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"

  authserver:
    build:
      context: .
      # Multi-stage production Dockerfile: SDK build stage runs `dotnet publish`,
      # final stage is the small aspnet runtime image with only the published
      # output (~0.6 GB vs the old single-stage SDK Dockerfile.dev ~4.6 GB). No
      # source is mounted, so to apply a backend code change, rebuild:
      # `docker compose up -d --build authserver`.
      dockerfile: src/HealthcareSupport.CaseEvaluation.AuthServer/Dockerfile
      args:
        ABP_NUGET_API_KEY: "${ABP_NUGET_API_KEY}"
    environment:
      DOTNET_ENVIRONMENT: Development
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      AbpLicenseCode: "${ABP_LICENSE_CODE}"
      App__SelfUrl: "http://localhost:${AUTH_PORT:-44368}"
      # ADR-006 (2026-05-05) -- subdomain tenant routing. Wildcard
      # *.localhost origins are matched by ABP's CORS policy because
      # `SetIsOriginAllowedToAllowWildcardSubdomains()` is wired in
      # CaseEvaluationAuthServerModule.ConfigureServices. Drop bare
      # `localhost` entries when prod migrates off `*.localhost`.
      App__CorsOrigins: "http://localhost:${NG_PORT:-4200},http://localhost:${API_PORT:-44327},http://*.localhost:${NG_PORT:-4200},http://*.localhost:${API_PORT:-44327}"
      # G5 (2026-05-04): the in-process HealthChecks UI probe constructs
      # an absolute URL from this env var. Without it, ABP falls back to
      # the listener bind address, which curl rejects as a non-target.
      App__HealthUiCheckUrl: "http://localhost:8080/health-status"
      AuthServer__Authority: "http://localhost:${AUTH_PORT:-44368}"
      AuthServer__RequireHttpsMetadata: "false"
      ConnectionStrings__Default: "Server=sql-server;Database=${DB_NAME:-CaseEvaluation};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      Redis__Configuration: redis
      StringEncryption__DefaultPassPhrase: "${STRING_ENCRYPTION_PASSPHRASE}"
      # BUG-014 (Task A, 2026-05-20) -- App__AngularUrl supplies the SPA URL
      # to CaseEvaluationSettingDefinitionProvider (via IConfiguration) as
      # the tenant-less default for the Notifications.PortalBaseUrl setting.
      # AuthServer:Authority (already env-var-driven below) supplies the
      # default for Notifications.AuthServerBaseUrl. TenantUrlComposer at
      # the resolve site prepends `${tenant}.` from ICurrentTenant.Name.
      # (Earlier attempt: Settings:* env-var prefix. Blocked because Docker
      # drops env-var names with literal dots; ABP's flat-key lookup needs
      # `Settings:CaseEvaluation.Notifications.*` which env vars can't express.)
      App__AngularUrl: "http://localhost:${NG_PORT:-4200}"
      # BUG-028 (2026-05-20) -- per-stack OpenIddict wildcard formats so
      # the AuthServer accepts tenant-subdomain redirect_uris on whichever
      # port set this stack is running. Main stack defaults to canonical
      # ports; parallel worktrees override via NG_PORT/AUTH_PORT/API_PORT.
      App__WildcardDomainsFormat__0: "http://{0}.localhost:${NG_PORT:-4200}"
      App__WildcardDomainsFormat__1: "http://{0}.localhost:${AUTH_PORT:-44368}"
      App__WildcardDomainsFormat__2: "http://{0}.localhost:${API_PORT:-44327}"
      # 2026-05-13: MinIO blob storage (see CaseEvaluationDomainModule).
      BlobStoring__Minio__Endpoint: "minio:9000"
      BlobStoring__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      BlobStoring__Minio__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      BlobStoring__Minio__BucketName: "${MINIO_BUCKET_NAME:-case-evaluation-documents}"
      BlobStoring__Minio__WithSsl: "false"
      BlobStoring__Minio__CreateBucketIfNotExists: "true"
    volumes:
      # The published image is self-contained (content root /app). Only the real
      # secrets file is mounted, overriding the {} placeholder baked at build time.
      - ./docker/appsettings.secrets.json:/app/appsettings.secrets.json:ro
      # ABP Commercial runtime license. Same mount db-migrator (also a prod
      # aspnet image) uses to license itself -- without it the host fails at
      # startup with ABP-LIC-ERROR. The prod image runs as root, so /root resolves.
      - ${HOME}/.abp/cli:/root/.abp/cli:ro
    ports:
      - "127.0.0.1:${AUTH_PORT:-44368}:8080"
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health-status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      # First-boot needs to restore + build before the listener opens. A
      # generous start_period covers cold containers on slow disks.
      start_period: 180s

  api:
    build:
      context: .
      # Multi-stage production Dockerfile (see authserver). Rebuild to apply a
      # backend code change: `docker compose up -d --build api`.
      dockerfile: src/HealthcareSupport.CaseEvaluation.HttpApi.Host/Dockerfile
      args:
        ABP_NUGET_API_KEY: "${ABP_NUGET_API_KEY}"
    environment:
      DOTNET_ENVIRONMENT: Development
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      AbpLicenseCode: "${ABP_LICENSE_CODE}"
      App__SelfUrl: "http://localhost:${API_PORT:-44327}"
      # ADR-006 (2026-05-05) -- subdomain tenant routing. See AuthServer block.
      App__CorsOrigins: "http://localhost:${NG_PORT:-4200},http://localhost:${AUTH_PORT:-44368},http://*.localhost:${NG_PORT:-4200},http://*.localhost:${AUTH_PORT:-44368}"
      App__HealthUiCheckUrl: "http://localhost:8080/health-status"
      AuthServer__Authority: "http://localhost:${AUTH_PORT:-44368}"
      AuthServer__MetaAddress: "http://authserver:8080"
      AuthServer__RequireHttpsMetadata: "false"
      ConnectionStrings__Default: "Server=sql-server;Database=${DB_NAME:-CaseEvaluation};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      Redis__Configuration: redis
      StringEncryption__DefaultPassPhrase: "${STRING_ENCRYPTION_PASSPHRASE}"
      # BUG-014 (Task A, 2026-05-20) -- App__AngularUrl supplies the SPA URL
      # to CaseEvaluationSettingDefinitionProvider (via IConfiguration) as
      # the tenant-less default for the Notifications.PortalBaseUrl setting.
      # AuthServer:Authority (already env-var-driven below) supplies the
      # default for Notifications.AuthServerBaseUrl. TenantUrlComposer at
      # the resolve site prepends `${tenant}.` from ICurrentTenant.Name.
      # (Earlier attempt: Settings:* env-var prefix. Blocked because Docker
      # drops env-var names with literal dots; ABP's flat-key lookup needs
      # `Settings:CaseEvaluation.Notifications.*` which env vars can't express.)
      App__AngularUrl: "http://localhost:${NG_PORT:-4200}"
      # Phase 2 (2026-05-11) -- Gotenberg sidecar for DOCX -> PDF
      # conversion in the packet pipeline. Service name resolves via
      # Docker's internal DNS; CaseEvaluationDomainModule reads this
      # value (with a localhost fallback that matches this service name).
      Gotenberg__Url: "http://gotenberg:3000"
      # 2026-05-13: MinIO blob storage (see CaseEvaluationDomainModule).
      BlobStoring__Minio__Endpoint: "minio:9000"
      BlobStoring__Minio__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      BlobStoring__Minio__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      BlobStoring__Minio__BucketName: "${MINIO_BUCKET_NAME:-case-evaluation-documents}"
      BlobStoring__Minio__WithSsl: "false"
      BlobStoring__Minio__CreateBucketIfNotExists: "true"
    volumes:
      # The published image is self-contained (content root /app). Only the real
      # secrets file is mounted, overriding the {} placeholder baked at build time.
      - ./docker/appsettings.secrets.json:/app/appsettings.secrets.json:ro
      # ABP Commercial runtime license (see authserver) -- without it the host
      # fails at startup with ABP-LIC-ERROR. Prod image runs as root.
      - ${HOME}/.abp/cli:/root/.abp/cli:ro
    ports:
      - "127.0.0.1:${API_PORT:-44327}:8080"
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health-status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  # Phase 2 (2026-05-11) -- LibreOffice-backed DOCX -> PDF conversion
  # via a Gotenberg sidecar. Custom Dockerfile bakes Microsoft Core
  # Fonts (Calibri, Arial, Times New Roman, etc.) on top of the
  # official gotenberg/gotenberg:8 image so packet templates render
  # without font substitution drift. See docker/Dockerfile.gotenberg-fonts.
  gotenberg:
    build:
      context: .
      dockerfile: docker/Dockerfile.gotenberg-fonts
    ports:
      - "127.0.0.1:${GOTENBERG_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  angular:
    build:
      context: ./angular
      # Multi-stage production Dockerfile: node build stage runs `ng build`,
      # final stage serves the static dist from nginx:alpine (~0.15 GB vs the
      # old browser-sync Dockerfile.dev ~5.5 GB). NG_CONFIG selects the
      # angular.json configuration shipping http (not https) URLs in dev.
      # Rebuild to apply an SPA change: `docker compose up -d --build angular`.
      dockerfile: Dockerfile
      args:
        NG_CONFIG: "${NG_CONFIG:-docker}"
    environment:
      # BUG-015 (Task B, 2026-05-20): per-stack port values passed into
      # the container so dev-entrypoint.sh's heredoc can write a
      # dynamic-env.json that reflects THIS stack's URLs (not canonical
      # baked defaults). Compose-level interpolation defaults match the
      # canonical ports.
      NG_PORT: "${NG_PORT:-4200}"
      AUTH_PORT: "${AUTH_PORT:-44368}"
      API_PORT: "${API_PORT:-44327}"
    # nginx listens on container port 80 (angular/nginx.conf), so host:4200 ->
    # container:80 is unchanged from the old browser-sync setup.
    ports:
      - "127.0.0.1:${NG_PORT:-4200}:80"
    volumes:
      # The static SPA is baked into the image; no source mount. This script is
      # sourced by nginx's /docker-entrypoint.d at startup and regenerates
      # dynamic-env.json from this stack's NG_PORT/AUTH_PORT/API_PORT, so the
      # same image works across worktrees (BUG-015). Mounted (not baked) so the
      # production image that helm builds from angular/Dockerfile stays unchanged.
      - ./angular/docker-dynamic-env.envsh:/docker-entrypoint.d/15-dynamic-env.envsh:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  sqldata:
  miniodata:
