[extend]
# Inherit the upstream default ruleset (aws-access-token, generic-api-key,
# private keys, etc.). Without this, gitleaks 8.x loads ZERO rules even
# when [allowlist] is present and silently passes every commit.
useDefault = true

# -------------------------------------------------------------------
# Scan mode convention for this repository
# -------------------------------------------------------------------
# All hooks and CI gates use GIT-AWARE scans, never `--no-git`:
#   pre-commit hook: `gitleaks protect --staged`
#   pre-push hook:   `gitleaks detect` (walks git log)
#   CI (Layer 2):    `gitleaks detect --log-opts="$BASE..$HEAD"`
#   weekly sweep:    TruffleHog in `.github/workflows/security.yml`
#
# Running `gitleaks detect --no-git` walks the working tree and will report
# false positives from gitignored local dev files (`.env`, `.env.local`,
# `appsettings.secrets.json`, `Logs/*.txt`, `node_modules/**`). That mode is
# reserved for one-off audits; the allowlist below exists so that even those
# audits stay quiet about known-safe paths.
# -------------------------------------------------------------------

[allowlist]
description = "Known safe patterns"
# NOTE: gitleaks reports file paths with the native OS separator (backslash
# on Windows, forward slash on Linux/macOS). Patterns below use the character
# class `[\\/]` everywhere a directory separator appears so they match on
# both platforms.
paths = [
  # All node_modules directories anywhere in the repo. Bundled dependency
  # READMEs and type definitions contain example tokens that are not secrets.
  '''[\\/]node_modules[\\/]''',
  # Old git-history backups created during inheritance-phase rewrites.
  '''\.git\.backup-.*''',
  # Runtime application logs. Gitignored, so they never reach a git-aware
  # scan, but `--no-git` audits pick them up. The app writing secrets into
  # these logs is a separate bug (PII logging) tracked in
  # docs/issues/SECURITY.md.
  '''[\\/]Logs[\\/].*\.txt''',
  # Local developer env files. Gitignored and expected to contain real local
  # secrets on the developer's machine. Ignored by git-aware scans; only
  # `--no-git` ever sees them.
  '''^\.env(\.[A-Za-z0-9_-]+)?$''',
  # Docker-compose local secret files. Gitignored.
  '''docker[\\/]appsettings\.secrets\.json$''',
  # Per-project appsettings.secrets.json files. Gitignored.
  '''[\\/]appsettings\.secrets\.json$''',
  # BUG-029 follow-up (2026-05-22) -- bug runbook documents synthetic
  # invitation-link tokens (`med_<base64>` format, never issued by a
  # real session). Gitleaks' generic-api-key rule flags the
  # high-entropy suffix; the file is documentation, not code.
  '''docs[\\/]runbooks[\\/]findings[\\/]bugs[\\/]BUG-029.*\.md$''',
  # Data-seeding scripts use synthetic tenant/user keys (T1_P1,
  # T4_NullPatient, etc.) per the HIPAA "synthetic data only" rule. Whole
  # directory is test scaffolding.
  '''scripts[\\/]phases[\\/]Phase-.*\.ps1''',
  # Bug/observation reports under docs/runbooks/findings/ embed example
  # URLs (OAuth invite tokens, OpenID confirmation tokens, OOB codes) to
  # document specific reproductions. Those tokens are synthetic from local
  # dev tenants and high-entropy enough to trigger generic-api-key. Adrian
  # is the only writer and these docs are intentional documentation; if a
  # real secret ever slipped into a finding it would be caught at code-
  # review time. Allowlist the folder rather than chasing individual
  # fingerprints. 2026-05-23 added after BUG-029's invite-token example
  # blocked every push from the repo.
  '''docs[\\/]runbooks[\\/]findings[\\/].*\.md''',
]
regexTarget = "match"
regexes = [
  '''REPLACE_ME_LOCALLY''',
  '''REPLACE_ME''',
  '''localhost''',
  '''\$\{.*\}''',
  '''your-.*-here''',
  '''generate-your-own.*''',
  # Synthetic seeded-tenant keys: T1_P1, T2_AA1, T4_NullPatient, T5_DA2, etc.
  '''T\d+_[A-Za-z]+\d*''',
  # BUG-029 follow-up (2026-05-22) -- synthetic invitation tokens in
  # docs/runbooks/findings/bugs/BUG-029-*.md and related runbook docs
  # use the `med_<base64-ish>` prefix to document one-time-use invite
  # URLs. Gitleaks' generic-api-key rule flags the high-entropy
  # remainder; the prefix + 32-char alphanumeric suffix is the
  # documented synthetic format (no real session ever issues these).
  '''med_[A-Za-z0-9_-]{30,}''',
]
