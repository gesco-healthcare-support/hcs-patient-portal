name: Gitleaks (PR)

# Per-PR secret scan. Backs up the Layer 1 `pre-commit` gitleaks hook for
# commits that bypass it (web UI, Dependabot, --no-verify). Uses the repo's
# existing .gitleaks.toml automatically. Scoped to the PR commit range via the
# action's built-in GitHub context detection.
#
# Weekly full-history TruffleHog in security.yml serves a different purpose
# (catches secrets in old commits after new detection patterns ship).

on:
  pull_request:
    branches: [main, development, staging, production]

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: 'Gitleaks: PR commits'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free for public repos; no GITLEAKS_LICENSE secret needed.
