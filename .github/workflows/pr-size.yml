name: PR Size

on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: CodelyTV/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: '10'
          s_label: 'size/S'
          s_max_size: '50'
          m_label: 'size/M'
          m_max_size: '200'
          l_label: 'size/L'
          l_max_size: '500'
          xl_label: 'size/XL'
