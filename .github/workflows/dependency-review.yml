name: Dependency Review

on:
  pull_request:
    branches: [main, development, staging, production]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: 'Dependency Review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          comment-summary-in-pr: always
          # License deny-list. LGPL-3.0 is NOT denied: the entire ABP framework
          # and 22+ ABP npm packages are LGPL-3.0. FSF's LGPL-3.0 FAQ makes
          # clear that hosting a SaaS (no binary distribution to end users)
          # does not trigger the source-disclosure obligation. Denying LGPL-3.0
          # would block the entire stack.
          deny-licenses: >-
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0-only,
            GPL-3.0-or-later,
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            SSPL-1.0
        continue-on-error: true
