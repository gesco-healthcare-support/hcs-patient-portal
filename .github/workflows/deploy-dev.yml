name: Deploy Dev

# Triggers ONLY when a PR is merged to development (push event = post-merge)
on:
  push:
    branches: [development]

permissions:
  contents: read
  pull-requests: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  validate:
    name: 'Dev: Validate'
    # Skip initial/bulk pushes
    if: github.event.head_commit.message != '' && !startsWith(github.event.head_commit.message, 'Initial commit')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Generate NuGet.Config
        run: sed "s/\${ABP_NUGET_API_KEY}/${{ secrets.ABP_NUGET_API_KEY }}/" NuGet.Config.template > NuGet.Config
      - name: Create placeholder secrets files
        run: |
          for dir in src/HealthcareSupport.CaseEvaluation.AuthServer \
                     src/HealthcareSupport.CaseEvaluation.HttpApi.Host \
                     src/HealthcareSupport.CaseEvaluation.DbMigrator \
                     test/HealthcareSupport.CaseEvaluation.TestBase \
                     test/HealthcareSupport.CaseEvaluation.HttpApi.Client.ConsoleTestApp; do
            if [ -n "${{ secrets.ABP_LICENSE_CODE }}" ]; then
              echo "{\"AbpLicenseCode\": \"${{ secrets.ABP_LICENSE_CODE }}\"}" > "$dir/appsettings.secrets.json"
            else
              echo '{}' > "$dir/appsettings.secrets.json"
            fi
          done
      - run: |
          dotnet build HealthcareSupport.CaseEvaluation.slnx -c Release
          dotnet test HealthcareSupport.CaseEvaluation.slnx -c Release

  auto-pr-staging:
    name: 'Auto PR: development -> staging'
    runs-on: ubuntu-latest
    needs: validate
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for existing PR
        id: check
        run: |
          existing=$(gh pr list --base staging --head development --state open --json number -q '.[0].number')
          echo "existing=$existing" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
      - name: Build PR body
        if: steps.check.outputs.existing == ''
        run: |
          git fetch origin staging
          commits=$(git log origin/staging..origin/development --oneline --no-merges 2>/dev/null || echo "_(unable to determine)_")
          count=$(echo "$commits" | grep -c . 2>/dev/null || echo "0")
          cat > /tmp/pr-body.md <<EOF
          ## Promotion: development -> staging

          **${count} commit(s) to promote:**

          \`\`\`
          ${commits}
          \`\`\`

          Auto-generated after development validation passed. Review and merge (merge commit) to promote.
          EOF
          sed -i 's/^          //' /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
      - name: Create PR
        if: steps.check.outputs.existing == ''
        run: |
          gh pr create \
            --base staging \
            --head development \
            --title "ci(sync): promote development to staging" \
            --body-file /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
