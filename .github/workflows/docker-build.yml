name: Docker Build

on:
  pull_request:
    branches: [main, development, staging, production]
    paths:
      - 'src/**'
      - 'angular/**'
      - 'docker/**'
      - '.dockerignore'
      - 'common.props'
      - 'NuGet.Config.template'
      - 'HealthcareSupport.CaseEvaluation.slnx'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKER_BUILDKIT: 1

jobs:
  docker-build:
    name: 'Docker: Build Images'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/api.Dockerfile --build-arg ABP_NUGET_API_KEY=${{ secrets.ABP_NUGET_API_KEY }} -t patient-portal-api:ci .

      - name: Build AuthServer image
        run: docker build -f docker/authserver.Dockerfile --build-arg ABP_NUGET_API_KEY=${{ secrets.ABP_NUGET_API_KEY }} -t patient-portal-auth:ci .

      - name: Build DbMigrator image
        run: docker build -f docker/dbmigrator.Dockerfile --build-arg ABP_NUGET_API_KEY=${{ secrets.ABP_NUGET_API_KEY }} -t patient-portal-migrator:ci .

      - name: Build Angular image
        run: docker build -f docker/angular.Dockerfile -t patient-portal-ui:ci .
