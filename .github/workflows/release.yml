name: Release

on:
  push:
    branches: [production]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: 'Create Release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
