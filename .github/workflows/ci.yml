name: CI

on:
  pull_request:
    branches: [main, development, staging, production]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  changes:
    name: 'Meta: Changed paths'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'test/**'
              - '*.sln'
              - '*.slnx'
              - 'Directory.Build.props'
              - 'NuGet.Config.template'
              - 'common.props'
              - 'global.json'
            frontend:
              - 'angular/**'
            shared:
              - '.github/**'
              - 'docs/**'
              - '.editorconfig'
              - '.gitleaks.toml'
              - '.markdownlint.json'

  backend-build:
    name: 'Backend: Build'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/common.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Generate NuGet.Config
        run: sed "s/\${ABP_NUGET_API_KEY}/${{ secrets.ABP_NUGET_API_KEY }}/" NuGet.Config.template > NuGet.Config
      - name: Create placeholder secrets files (ABP requires these to build)
        run: |
          for dir in src/HealthcareSupport.CaseEvaluation.AuthServer \
                     src/HealthcareSupport.CaseEvaluation.HttpApi.Host \
                     src/HealthcareSupport.CaseEvaluation.DbMigrator \
                     test/HealthcareSupport.CaseEvaluation.TestBase \
                     test/HealthcareSupport.CaseEvaluation.HttpApi.Client.ConsoleTestApp; do
            if [ -n "${{ secrets.ABP_LICENSE_CODE }}" ]; then
              echo "{\"AbpLicenseCode\": \"${{ secrets.ABP_LICENSE_CODE }}\"}" > "$dir/appsettings.secrets.json"
            else
              echo '{}' > "$dir/appsettings.secrets.json"
            fi
          done
      - run: dotnet restore HealthcareSupport.CaseEvaluation.slnx
      - run: dotnet build HealthcareSupport.CaseEvaluation.slnx --no-restore -c Release
      - name: Backend Build (warnings-as-errors, informational)
        continue-on-error: true
        run: dotnet build HealthcareSupport.CaseEvaluation.slnx --no-restore -c Release -warnaserror
        # Phase A informational step — surfaces the pre-existing warnings that
        # Phase B #3 will resolve. Does not block merge. When Phase C flips
        # Directory.Build.props <TreatWarningsAsErrors> to true, this separate
        # step is removed and -warnaserror folds into the primary build above.

  docs-structure:
    name: 'Docs: Structure Check'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Verify documentation structure
        run: python .claude/scripts/verify_structure.py
      - name: Check documentation links
        run: python .claude/scripts/check-links.py || true
        # Link check is non-blocking: pre-existing broken links (tracked in
        # docs/verification/BASELINE.md) should not fail CI. The job still
        # prints the full report for visibility.

  backend-test:
    name: 'Backend: Test'
    runs-on: ubuntu-latest
    needs: [changes, backend-build]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/common.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Generate NuGet.Config
        run: sed "s/\${ABP_NUGET_API_KEY}/${{ secrets.ABP_NUGET_API_KEY }}/" NuGet.Config.template > NuGet.Config
      - name: Create placeholder secrets files
        run: |
          for dir in src/HealthcareSupport.CaseEvaluation.AuthServer \
                     src/HealthcareSupport.CaseEvaluation.HttpApi.Host \
                     src/HealthcareSupport.CaseEvaluation.DbMigrator \
                     test/HealthcareSupport.CaseEvaluation.TestBase \
                     test/HealthcareSupport.CaseEvaluation.HttpApi.Client.ConsoleTestApp; do
            if [ -n "${{ secrets.ABP_LICENSE_CODE }}" ]; then
              echo "{\"AbpLicenseCode\": \"${{ secrets.ABP_LICENSE_CODE }}\"}" > "$dir/appsettings.secrets.json"
            else
              echo '{}' > "$dir/appsettings.secrets.json"
            fi
          done
      - run: dotnet restore HealthcareSupport.CaseEvaluation.slnx
      - name: Test
        run: >
          dotnet test HealthcareSupport.CaseEvaluation.slnx
          --no-restore -c Release
          --logger "trx;LogFileName=results.trx"
          --results-directory ./test-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: ./test-results
          retention-days: 14

  frontend-build:
    name: 'Frontend: Build'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true'
    timeout-minutes: 15
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install
      - run: yarn build:prod

  frontend-lint:
    name: 'Frontend: Lint'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install
      - run: yarn lint

  frontend-test:
    name: 'Frontend: Test'
    runs-on: ubuntu-latest
    needs: [changes, frontend-build]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true'
    timeout-minutes: 25
    # Phase A: non-blocking. The hard-fail for missing specs is intentional
    # (no silent-pass), but Phase A merges stay unblocked until Phase B adds
    # specs. Phase C removes this flag to make the gate blocking.
    continue-on-error: true
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install
      - name: Check for test files
        run: |
          if find src -name "*.spec.ts" | grep -q .; then
            echo "Found spec files; proceeding with tests." >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::No *.spec.ts files found under angular/src. Refusing to silent-pass the frontend test job. Add specs or explicitly delete this job from ci.yml."
            exit 1
          fi
      - name: Run tests with coverage
        run: yarn test --watch=false --browsers=ChromeHeadless --code-coverage

  backend-format:
    name: 'Backend: Format Check'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true'
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/common.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Generate NuGet.Config
        run: sed "s/\${ABP_NUGET_API_KEY}/${{ secrets.ABP_NUGET_API_KEY }}/" NuGet.Config.template > NuGet.Config
      - name: Create placeholder secrets files
        run: |
          for dir in src/HealthcareSupport.CaseEvaluation.AuthServer \
                     src/HealthcareSupport.CaseEvaluation.HttpApi.Host \
                     src/HealthcareSupport.CaseEvaluation.DbMigrator \
                     test/HealthcareSupport.CaseEvaluation.TestBase \
                     test/HealthcareSupport.CaseEvaluation.HttpApi.Client.ConsoleTestApp; do
            if [ -n "${{ secrets.ABP_LICENSE_CODE }}" ]; then
              echo "{\"AbpLicenseCode\": \"${{ secrets.ABP_LICENSE_CODE }}\"}" > "$dir/appsettings.secrets.json"
            else
              echo '{}' > "$dir/appsettings.secrets.json"
            fi
          done
      - run: dotnet restore HealthcareSupport.CaseEvaluation.slnx
      - run: dotnet format HealthcareSupport.CaseEvaluation.slnx --no-restore --verify-no-changes --verbosity diagnostic

  frontend-format:
    name: 'Frontend: Format Check'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true'
    timeout-minutes: 10
    continue-on-error: true
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install
      - run: yarn format:check
