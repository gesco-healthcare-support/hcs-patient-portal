name: CI

on:
  pull_request:
    branches: [main, development, staging, production]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  backend-build:
    name: 'Backend: Build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/common.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Generate NuGet.Config
        run: sed "s/\${ABP_NUGET_API_KEY}/${{ secrets.ABP_NUGET_API_KEY }}/" NuGet.Config.template > NuGet.Config
      - name: Create placeholder secrets files (ABP requires these to build)
        run: |
          for dir in src/HealthcareSupport.CaseEvaluation.AuthServer \
                     src/HealthcareSupport.CaseEvaluation.HttpApi.Host \
                     src/HealthcareSupport.CaseEvaluation.DbMigrator \
                     test/HealthcareSupport.CaseEvaluation.TestBase \
                     test/HealthcareSupport.CaseEvaluation.HttpApi.Client.ConsoleTestApp; do
            if [ -n "${{ secrets.ABP_LICENSE_CODE }}" ]; then
              echo "{\"AbpLicenseCode\": \"${{ secrets.ABP_LICENSE_CODE }}\"}" > "$dir/appsettings.secrets.json"
            else
              echo '{}' > "$dir/appsettings.secrets.json"
            fi
          done
      - run: dotnet restore HealthcareSupport.CaseEvaluation.slnx
      - run: dotnet build HealthcareSupport.CaseEvaluation.slnx --no-restore -c Release

  docs-structure:
    name: 'Docs: Structure Check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Verify documentation structure
        run: python .claude/scripts/verify_structure.py
      - name: Check documentation links
        run: python .claude/scripts/check-links.py || true
        # Link check is non-blocking: pre-existing broken links (tracked in
        # docs/verification/BASELINE.md) should not fail CI. The job still
        # prints the full report for visibility.

  backend-test:
    name: 'Backend: Test'
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/common.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Generate NuGet.Config
        run: sed "s/\${ABP_NUGET_API_KEY}/${{ secrets.ABP_NUGET_API_KEY }}/" NuGet.Config.template > NuGet.Config
      - name: Create placeholder secrets files
        run: |
          for dir in src/HealthcareSupport.CaseEvaluation.AuthServer \
                     src/HealthcareSupport.CaseEvaluation.HttpApi.Host \
                     src/HealthcareSupport.CaseEvaluation.DbMigrator \
                     test/HealthcareSupport.CaseEvaluation.TestBase \
                     test/HealthcareSupport.CaseEvaluation.HttpApi.Client.ConsoleTestApp; do
            if [ -n "${{ secrets.ABP_LICENSE_CODE }}" ]; then
              echo "{\"AbpLicenseCode\": \"${{ secrets.ABP_LICENSE_CODE }}\"}" > "$dir/appsettings.secrets.json"
            else
              echo '{}' > "$dir/appsettings.secrets.json"
            fi
          done
      - run: dotnet restore HealthcareSupport.CaseEvaluation.slnx
      - name: Test
        run: >
          dotnet test HealthcareSupport.CaseEvaluation.slnx
          --no-restore -c Release
          --logger "trx;LogFileName=results.trx"
          --results-directory ./test-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: ./test-results
          retention-days: 14

  frontend-build:
    name: 'Frontend: Build'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install
      - run: yarn build:prod

  frontend-lint:
    name: 'Frontend: Lint'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install
      - run: yarn lint

  frontend-test:
    name: 'Frontend: Test'
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install
      - name: Check for test files
        id: check-tests
        run: |
          if find src -name "*.spec.ts" | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "⚠️ No spec files found — skipping frontend tests" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Run tests
        if: steps.check-tests.outputs.has_tests == 'true'
        run: yarn test --watch=false --browsers=ChromeHeadless

  backend-format:
    name: 'Backend: Format Check'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/common.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Generate NuGet.Config
        run: sed "s/\${ABP_NUGET_API_KEY}/${{ secrets.ABP_NUGET_API_KEY }}/" NuGet.Config.template > NuGet.Config
      - name: Create placeholder secrets files
        run: |
          for dir in src/HealthcareSupport.CaseEvaluation.AuthServer \
                     src/HealthcareSupport.CaseEvaluation.HttpApi.Host \
                     src/HealthcareSupport.CaseEvaluation.DbMigrator \
                     test/HealthcareSupport.CaseEvaluation.TestBase \
                     test/HealthcareSupport.CaseEvaluation.HttpApi.Client.ConsoleTestApp; do
            if [ -n "${{ secrets.ABP_LICENSE_CODE }}" ]; then
              echo "{\"AbpLicenseCode\": \"${{ secrets.ABP_LICENSE_CODE }}\"}" > "$dir/appsettings.secrets.json"
            else
              echo '{}' > "$dir/appsettings.secrets.json"
            fi
          done
      - run: dotnet restore HealthcareSupport.CaseEvaluation.slnx
      - run: dotnet format HealthcareSupport.CaseEvaluation.slnx --no-restore --verify-no-changes --verbosity diagnostic

  frontend-format:
    name: 'Frontend: Format Check'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install
      - run: yarn format:check
