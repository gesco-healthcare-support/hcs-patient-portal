name: CI

on:
  pull_request:
    branches: [main, development, staging, production]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  backend-build:
    name: 'Backend: Build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/common.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Generate NuGet.Config
        run: sed "s/\${ABP_NUGET_API_KEY}/${{ secrets.ABP_NUGET_API_KEY }}/" NuGet.Config.template > NuGet.Config
      - run: dotnet restore HealthcareSupport.CaseEvaluation.slnx
      - run: dotnet build HealthcareSupport.CaseEvaluation.slnx --no-restore -c Release

  backend-test:
    name: 'Backend: Test'
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/common.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Generate NuGet.Config
        run: sed "s/\${ABP_NUGET_API_KEY}/${{ secrets.ABP_NUGET_API_KEY }}/" NuGet.Config.template > NuGet.Config
      - run: dotnet restore HealthcareSupport.CaseEvaluation.slnx
      - name: Test
        run: >
          dotnet test HealthcareSupport.CaseEvaluation.slnx
          --no-restore -c Release
          --logger "trx;LogFileName=results.trx"
          --results-directory ./test-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: ./test-results
          retention-days: 14

  frontend-build:
    name: 'Frontend: Build'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn build:prod

  frontend-lint:
    name: 'Frontend: Lint'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  frontend-test:
    name: 'Frontend: Test'
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: angular/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn test --watch=false --browsers=ChromeHeadless
