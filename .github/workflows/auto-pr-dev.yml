name: Auto PR to Development

# Triggers ONLY when a PR is merged to main (push event = post-merge)
on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    name: 'Auto PR: main -> development'
    # Skip if this is the initial push (no PRs merged yet)
    if: github.event.head_commit.message != '' && !startsWith(github.event.head_commit.message, 'Initial commit')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for existing PR
        id: check
        run: |
          existing=$(gh pr list --base development --head main --state open --json number -q '.[0].number')
          echo "existing=$existing" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        if: steps.check.outputs.existing == ''
        run: |
          gh pr create \
            --base development \
            --head main \
            --title "Sync: main -> development" \
            --body "Auto-generated after merge to main. Review and merge to promote to development."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
