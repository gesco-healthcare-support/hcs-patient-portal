name: OpenSSF Scorecard

# Repo-level supply-chain security posture audit. Not per-PR (Scorecard
# measures repo-level properties like branch protection, pinned dependencies,
# signed releases, dangerous workflow patterns -- diff-level analysis doesn't
# make sense). Runs on push to main and weekly.
#
# Offset by 1 hour from security.yml to avoid runner contention.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'  # Monday 7 AM UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: 'Scorecard: Analysis'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
