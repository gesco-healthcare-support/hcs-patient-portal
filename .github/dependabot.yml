version: 2

# All version-update PRs target the long-lived chore/dependency-updates
# integration branch, NOT main. See
# docs/superpowers/specs/2026-05-21-dependency-integration-branch-design.md
# for the policy.
#
# Version-update PRs are disabled via open-pull-requests-limit: 0 until ABP
# Commercial supports Angular 20.3+. Security advisories (configured in repo
# settings, independent of this file) continue to flow into the integration
# branch regardless of the limit. The limit was briefly raised in #212 to
# recover four orphan PRs after the target-branch change; this PR restores
# it to 0 so future weekly scans do not surface unwanted bumps.

updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels: ["dependencies", "backend"]
    target-branch: "chore/dependency-updates"

  - package-ecosystem: "npm"
    directory: "/angular"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels: ["dependencies", "frontend"]
    target-branch: "chore/dependency-updates"

  - package-ecosystem: "npm"
    directory: "/src/HealthcareSupport.CaseEvaluation.AuthServer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels: ["dependencies", "backend"]
    target-branch: "chore/dependency-updates"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "ci"]
    target-branch: "chore/dependency-updates"
