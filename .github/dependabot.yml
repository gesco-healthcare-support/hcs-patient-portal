version: 2

# All version-update PRs target the long-lived chore/dependency-updates
# integration branch, NOT main. See
# docs/superpowers/specs/2026-05-21-dependency-integration-branch-design.md
# for the policy.
#
# Version-update PRs remain disabled via open-pull-requests-limit: 0
# until ABP Commercial supports Angular 20.3+. Security advisories (configured
# in repo settings, independent of this file) flow into the integration branch
# regardless of the limit.
#
# When ABP catches up: raise the limit to 5/3 here. The integration-branch
# policy stays in place independently.

updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels: ["dependencies", "backend"]
    target-branch: "chore/dependency-updates"

  - package-ecosystem: "npm"
    directory: "/angular"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels: ["dependencies", "frontend"]
    target-branch: "chore/dependency-updates"

  - package-ecosystem: "npm"
    directory: "/src/HealthcareSupport.CaseEvaluation.AuthServer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels: ["dependencies", "backend"]
    target-branch: "chore/dependency-updates"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "ci"]
    target-branch: "chore/dependency-updates"
