version: 2

# All version-update PRs target the long-lived chore/dependency-updates
# integration branch, NOT main. See
# docs/superpowers/specs/2026-05-21-dependency-integration-branch-design.md
# for the policy.
#
# TEMPORARY: open-pull-requests-limit raised from 0 to 5/3 to let Dependabot
# re-raise four PRs orphaned by the previous target-branch change
# (originals #169, #170, #172, #205). Once their replacements land in
# chore/dependency-updates, the limits will be reset to 0 via a follow-up PR
# to honor the ABP Commercial / Angular 20.3+ constraint. Security advisories
# (configured in repo settings, independent of this file) flow into the
# integration branch regardless of the limit.

updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    target-branch: "chore/dependency-updates"

  - package-ecosystem: "npm"
    directory: "/angular"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    target-branch: "chore/dependency-updates"

  - package-ecosystem: "npm"
    directory: "/src/HealthcareSupport.CaseEvaluation.AuthServer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    target-branch: "chore/dependency-updates"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    target-branch: "chore/dependency-updates"
