name: Feature Request
description: Suggest a new feature or enhancement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      placeholder: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should this work?
    validations:
      required: true
  - type: checkboxes
    id: hipaa
    attributes:
      label: HIPAA impact
      options:
        - label: This feature involves PHI (Protected Health Information)
        - label: This feature changes data access patterns
        - label: This feature adds new logging
