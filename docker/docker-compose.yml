services:
  sql-server:
    image: mcr.microsoft.com/azure-sql-edge:1.0.7
    container_name: patient-portal-db
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -Q "SELECT 1" -C -b -o /dev/null
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: patient-portal-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  db-migrator:
    build:
      context: ..
      dockerfile: docker/dbmigrator.Dockerfile
      args:
        ABP_NUGET_API_KEY: "${ABP_NUGET_API_KEY}"
    environment:
      ConnectionStrings__Default: "Server=sql-server;Database=CaseEvaluation;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Redis__Configuration: redis
    depends_on:
      sql-server:
        condition: service_healthy

  authserver:
    build:
      context: ..
      dockerfile: docker/authserver.Dockerfile
      args:
        ABP_NUGET_API_KEY: "${ABP_NUGET_API_KEY}"
    container_name: patient-portal-auth
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      App__SelfUrl: "http://localhost:44368"
      App__CorsOrigins: "http://localhost:4200,http://localhost:44327"
      ConnectionStrings__Default: "Server=sql-server;Database=CaseEvaluation;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Redis__Configuration: redis
      StringEncryption__DefaultPassPhrase: "${STRING_ENCRYPTION_PASSPHRASE}"
    ports:
      - "44368:8080"
    depends_on:
      sql-server:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
      args:
        ABP_NUGET_API_KEY: "${ABP_NUGET_API_KEY}"
    container_name: patient-portal-api
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      App__SelfUrl: "http://localhost:44327"
      App__CorsOrigins: "http://localhost:4200"
      AuthServer__Authority: "http://authserver:8080"
      AuthServer__RequireHttpsMetadata: "false"
      ConnectionStrings__Default: "Server=sql-server;Database=CaseEvaluation;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Redis__Configuration: redis
      StringEncryption__DefaultPassPhrase: "${STRING_ENCRYPTION_PASSPHRASE}"
    ports:
      - "44327:8080"
    depends_on:
      sql-server:
        condition: service_healthy
      redis:
        condition: service_healthy

  angular:
    build:
      context: ..
      dockerfile: docker/angular.Dockerfile
    container_name: patient-portal-ui
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  sqldata:

networks:
  default:
    name: patient-portal-network
