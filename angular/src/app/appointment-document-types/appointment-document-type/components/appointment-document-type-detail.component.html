<abp-modal [busy]="service.isBusy" [(visible)]="service.isVisible">
  <ng-template #abpHeader>
    <h3>
      {{
        (service.selected ? '::EditAppointmentDocumentType' : '::NewAppointmentDocumentType')
          | abpLocalization
      }}
    </h3>
  </ng-template>

  <ng-template #abpBody>
    <form
      [formGroup]="service.form"
      id="appointment-document-type"
      (ngSubmit)="service.submitForm()"
      validateOnSubmit
    >
      <ul ngbNav #nav="ngbNav" class="nav-tabs">
        <li ngbNavItem>
          <a ngbNavLink>
            {{ '::AppointmentDocumentType' | abpLocalization }}
          </a>
          <ng-template ngbNavContent>
            <div class="mt-2 fade-in-top">
              <div class="mb-3">
                <label class="form-label" for="appointment-document-type-name">
                  {{ '::Name' | abpLocalization }} *
                </label>

                <input
                  id="appointment-document-type-name"
                  formControlName="name"
                  class="form-control"
                  maxlength="100"
                  autofocus
                />
              </div>

              <div class="mb-3">
                <label class="form-label" for="appointment-document-type-appointment-type">
                  {{ '::AppointmentType' | abpLocalization }}
                </label>

                <select
                  id="appointment-document-type-appointment-type"
                  formControlName="appointmentTypeId"
                  class="form-select"
                >
                  <option [ngValue]="null">{{ '::AllAppointmentTypes' | abpLocalization }}</option>
                  @for (type of service.appointmentTypes; track type.id) {
                    <option [ngValue]="type.id">{{ type.name }}</option>
                  }
                </select>
                <small class="form-text text-muted">
                  {{ '::AppliesToAllTypesHint' | abpLocalization }}
                </small>
              </div>

              <div class="form-check mb-3">
                <input
                  id="appointment-document-type-is-active"
                  type="checkbox"
                  formControlName="isActive"
                  class="form-check-input"
                />
                <label class="form-check-label" for="appointment-document-type-is-active">
                  {{ '::IsActive' | abpLocalization }}
                </label>
              </div>
            </div>
          </ng-template>
        </li>
      </ul>
      <div [ngbNavOutlet]="nav"></div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>
      {{ 'AbpUi::Cancel' | abpLocalization }}
    </button>

    <abp-button iconClass="fa fa-check" buttonType="submit" formName="appointment-document-type">
      {{ 'AbpUi::Save' | abpLocalization }}
    </abp-button>
  </ng-template>
</abp-modal>
