<div class="top-header-navbar" style="margin-right: 73px">
  <a class="top-header-navbar__brand" href="/" aria-label="Home">
    <img
      src="assets/images/header-logo.png"
      [alt]="tenantName + ' logo'"
      class="top-header-navbar__logo"
    />
  </a>

  <div class="top-header-navbar__user-meta">
    <span>
      Welcome,
      <strong>{{ userName }}</strong>
      @if (roleName) {
        ({{ roleName }})
      }
    </span>

    @if (showProfile) {
      <span class="top-header-navbar__divider">|</span>
      <a href="javascript:void(0)" (click)="onProfileClick()">My profile</a>
    }
  </div>
</div>
