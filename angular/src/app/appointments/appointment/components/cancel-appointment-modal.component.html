<abp-modal [busy]="isBusy" [visible]="visible" (visibleChange)="setVisible($event)">
  <ng-template #abpHeader>
    <h3>{{ '::Appointment:Modal:CancelTitle' | abpLocalization }}</h3>
  </ng-template>

  <ng-template #abpBody>
    <div class="mb-3">
      <label class="form-label d-block">
        {{ '::Appointment:Modal:CancelOutcomeLabel' | abpLocalization }} *
      </label>
      <div class="form-check form-check-inline">
        <input
          id="cancel-outcome-nobill"
          class="form-check-input"
          type="radio"
          name="cancel-outcome"
          [value]="noBillOutcome"
          [(ngModel)]="cancellationOutcome"
        />
        <label class="form-check-label" for="cancel-outcome-nobill">
          {{ '::Appointment:Modal:CancelOutcomeNoBill' | abpLocalization }}
        </label>
      </div>
      <div class="form-check form-check-inline">
        <input
          id="cancel-outcome-late"
          class="form-check-input"
          type="radio"
          name="cancel-outcome"
          [value]="lateOutcome"
          [(ngModel)]="cancellationOutcome"
        />
        <label class="form-check-label" for="cancel-outcome-late">
          {{ '::Appointment:Modal:CancelOutcomeLate' | abpLocalization }}
        </label>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label" for="cancel-reason">
        {{ '::Appointment:Modal:CancelReasonLabel' | abpLocalization }} *
      </label>
      <textarea
        id="cancel-reason"
        class="form-control"
        rows="4"
        [maxlength]="maxReasonLength"
        [(ngModel)]="reason"
        [placeholder]="'::Appointment:Modal:CancelReasonPlaceholder' | abpLocalization"
        required
      ></textarea>
      <small class="text-muted">{{ reason.length }} / {{ maxReasonLength }}</small>
    </div>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>
      {{ '::Appointment:Action:Cancel' | abpLocalization }}
    </button>

    <abp-button
      iconClass="fa fa-ban"
      buttonType="button"
      [disabled]="!canSubmit"
      (click)="submit()"
    >
      {{ '::Appointment:Action:CancelAppointment' | abpLocalization }}
    </abp-button>
  </ng-template>
</abp-modal>
