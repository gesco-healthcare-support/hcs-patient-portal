<!-- #121 phase T3 (2026-05-13) -- Employer Details section. The 7
     FormControls live on the parent's `form` FormGroup; the child wraps
     in [formGroup]="form" so formControlName directives bind to the
     same controls the parent owns. -->
<div [formGroup]="form" class="card mb-4">
  <div class="card-header">
    <h5 class="card-title mb-0 fw-bold">Employer Details</h5>
  </div>
  <div class="card-body">
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label fw-semibold">Employer Name *</label>
        <input
          class="form-control"
          formControlName="employerName"
          maxlength="255"
          placeholder="EMPLOYER NAME"
        />
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label fw-semibold">Occupation *</label>
        <input
          class="form-control"
          formControlName="employerOccupation"
          maxlength="255"
          placeholder="OCCUPATION"
        />
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label fw-semibold">{{ '::PhoneNumber' | abpLocalization }}</label>
        <input
          class="form-control"
          formControlName="employerPhoneNumber"
          maxlength="12"
          placeholder="PHONE NUMBER"
        />
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label fw-semibold">{{ '::Street' | abpLocalization }}</label>
        <input
          class="form-control"
          formControlName="employerStreet"
          maxlength="255"
          placeholder="STREET"
        />
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label fw-semibold">{{ '::City' | abpLocalization }}</label>
        <input
          class="form-control"
          formControlName="employerCity"
          maxlength="255"
          placeholder="CITY"
        />
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label fw-semibold">{{ '::State' | abpLocalization }}</label>
        <abp-lookup-select
          cid="appointment-employer-state-id"
          formControlName="employerStateId"
          [getFn]="getStateLookup"
          [class.is-invalid]="
            form.get('employerStateId')?.invalid && form.get('employerStateId')?.touched
          "
        ></abp-lookup-select>
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label fw-semibold">{{ '::ZipCode' | abpLocalization }}</label>
        <input
          class="form-control"
          formControlName="employerZipCode"
          maxlength="10"
          placeholder="ZIP"
        />
      </div>
    </div>
  </div>
</div>
