<!--
  Internal Workflow (Prompt 13): per-appointment change log. Renders inside the
  internal shell; reuses the shared <app-change-log-timeline> so the per-save
  grouping + field diffs + PHI redaction match the global list exactly.
-->
<div class="ia-head">
  <div>
    <h1>Change log</h1>
    <p>Every recorded change to this appointment and its claim details.</p>
  </div>
  <button class="af-btn af-btn--ghost" type="button" (click)="back()">
    <app-icon name="chevLeft" [size]="15" />
    Back to appointment
  </button>
</div>

@if (isLoading) {
  <div class="clg" style="padding: 18px; color: var(--n-500)">Loading change log&hellip;</div>
} @else if (errorMessage) {
  <div
    class="ia-empty"
    style="background: #fff; border: 1px solid var(--border); border-radius: var(--r-md)"
  >
    <app-icon name="alert" [size]="36" />
    <b>Unable to load</b>
    <span>{{ errorMessage }}</span>
  </div>
} @else {
  <app-change-log-timeline [rows]="entries" />
}
