services:
  caseevaluation-angular:
    image: healthcaresupport/caseevaluation-angular:latest
    container_name: caseevaluation-angular
    build:
      context: ../../
      dockerfile: angular/Dockerfile.local
    ports:
      - "4200:80"
    depends_on:
      - caseevaluation-api
    volumes:
      - ./dynamic-env.json://usr/share/nginx/html/dynamic-env.json
    networks:
      - abp-network

  caseevaluation-api:
    image: healthcaresupport/caseevaluation-api:latest
    container_name: caseevaluation-api
    hostname: caseevaluation-api
    build:
      context: ../../
      dockerfile: src/HealthcareSupport.CaseEvaluation.HttpApi.Host/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - App__SelfUrl=https://localhost:44300
      - App__AngularUrl=http://localhost:4200
      - App_CorsOrigins=http://localhost:4200
      - App__HealthCheckUrl=http://caseevaluation-api:8080/health-status
      - AuthServer__RequireHttpsMetadata=false
      - AuthServer__Authority=http://caseevaluation-authserver:8080
      - AuthServer__MetaAddress=https://localhost:44368
      - ConnectionStrings__Default=Data Source=sql-server;Initial Catalog=CaseEvaluation;User Id=sa;Password=${SA_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=True;
      - Redis__Configuration=redis
    ports:
      - "44327:8081"
    depends_on:
      sql-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure    
    volumes:
      - ./certs:/app/certs
    networks:
      - abp-network
  
  caseevaluation-authserver:
    image: healthcaresupport/caseevaluation-authserver:latest
    container_name: caseevaluation-authserver
    build:
      context: ../../
      dockerfile: src/HealthcareSupport.CaseEvaluation.AuthServer/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - App__SelfUrl=https://localhost:44368
      - App__CorsOrigins=http://localhost:4200,https://localhost:44327
      - App__HealthCheckUrl=http://caseevaluation-authserver:8080/health-status
      - AuthServer__RequireHttpsMetadata=false
      - AuthServer__Authority=https://localhost:44368
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ConnectionStrings__Default=Data Source=sql-server;Initial Catalog=CaseEvaluation;User Id=sa;Password=${SA_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=True;
      - Redis__Configuration=redis
    ports:
      - "44368:8081"
    depends_on:
      sql-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./certs:/app/certs
    networks:
      - abp-network

  db-migrator:
    image: healthcaresupport/caseevaluation-db-migrator:latest
    container_name: db-migrator
    build:
      context: ../../
      dockerfile: src/HealthcareSupport.CaseEvaluation.DbMigrator/Dockerfile.local
    environment:
      - OpenIddict__Applications__CaseEvaluation_App__RootUrl=http://localhost:4200
      - OpenIddict__Applications__CaseEvaluation_Swagger__RootUrl=https://localhost:44327
      - ConnectionStrings__Default=Data Source=sql-server;Initial Catalog=CaseEvaluation;User Id=sa;Password=${SA_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=True;
      - Redis__Configuration=redis
    restart: on-failure
    depends_on:
      sql-server:
        condition: service_healthy
    networks:
      - abp-network    
  
  sql-server:
    container_name: sql-server
    image: mcr.microsoft.com/azure-sql-edge:1.0.7
    ports:
      - "1434:1433"
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - abp-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S sql-server -U sa -P "${SA_PASSWORD}" -Q "SELECT 1" -C -b -o /dev/null
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - abp-network  
    healthcheck:
      test: ["CMD", "redis-cli","ping"]      
volumes:
  sqldata:
    name: caseevaluation_sqldata
networks:
  abp-network:
    name: caseevaluation-network
    driver: bridge
