{{- /*
SQL Server SA password Secret.
Production deployments MUST override .Values.saPassword via --set or a
values file. Default value is an obvious placeholder to force explicit
configuration.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: "{{ .Release.Name }}-{{ .Chart.Name }}-secret"
type: Opaque
data:
  sa-password: {{ .Values.saPassword | default "CHANGE_ME_IN_PROD" | b64enc | quote }}