apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-configmap
data:
  dynamic-env.json: |-
    {
        "production": "true",
        "application": {
            "baseUrl": "{{ include "caseevaluation.hosts.angular" . }}",
            "name": "CaseEvaluation",
            "logoUrl": ""
        },
        "oAuthConfig": {
            "issuer": "{{ include "caseevaluation.hosts.authserver" . }}",
            "redirectUri": "{{ include "caseevaluation.hosts.angular" . }}",
            "requireHttps": "false",
            "clientId": "CaseEvaluation_App",
            "responseType": "code",
            "scope": "offline_access CaseEvaluation",
            "strictDiscoveryDocumentValidation": false,
            "skipIssuerCheck": true
        },
        "apis": {
            "default": {
                "url": "{{ include "caseevaluation.hosts.httpapi" . }}",
                "rootNamespace": "HealthcareSupport.CaseEvaluation"
            }
        }
    }