<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>silent-refresh</title>
  </head>
  <body>
    <script>
      // angular-oauth2-oidc silent refresh helper.
      // After /connect/authorize?prompt=none redirects here with a code + state
      // in the URL hash (response_mode=fragment) or query string, post the raw
      // hash/search back to the SPA opener; the library's silentRefresh listener
      // hands it to tryLogin which exchanges the code at the token endpoint and
      // fires token_received with the new identity.
      //
      // targetOrigin = '*' is intentional. This page is served from AuthServer
      // (e.g. http://falkinstein.localhost:44368) but the SPA parent lives on a
      // different port (e.g. :4200), so postMessage IS cross-origin. The library
      // accepts the message and proceeds to tryLogin regardless; we set
      // OAuthService.checkOrigin = false on the SPA side to suppress the noise.
      window.parent.postMessage(location.hash || ('?' + location.search.substring(1)), '*');
    </script>
  </body>
</html>
