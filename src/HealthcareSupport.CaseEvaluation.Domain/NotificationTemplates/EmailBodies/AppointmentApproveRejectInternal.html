<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
</head>
<body style="font-family: Arial, Helvetica, sans-serif; font-size: 14px; line-height: 20px; color: #000;">
    <p>Hello ##StaffFirstName##,</p>
    <p>Your appointment queue currently has:</p>
    <ul>
        <li><strong>New (pending) requests:</strong> ##PendingAppointmentCount##</li>
        <li><strong>Approved requests awaiting follow-up:</strong> ##ApprovedAppointmentCount##</li>
    </ul>
    <p>Please log in to the patient portal to review and act on these requests.</p>
    <p style="margin-top: 20px;">
        <a href="##PortalUrl##" style="background:#0d6efd;color:#fff;padding:10px 20px;text-decoration:none;border-radius:4px;">
            Open patient portal
        </a>
    </p>
</body>
</html>
