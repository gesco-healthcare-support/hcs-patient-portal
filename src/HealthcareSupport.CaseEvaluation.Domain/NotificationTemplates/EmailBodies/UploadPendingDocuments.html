<body style="font-family: Arial, Helvetica, sans-serif; font-size: 14px; line-height: 20px; color: #000;">
    <p>Hello,</p>
    <p>Appointment request <b style="font-size:17px">##AppointmentRequestConfirmationNumber##</b> still has pending documents.</p>
    <p>
        <strong>Due date:</strong> ##DueDate##<br />
        <strong>Pending documents:</strong> ##PendingDocList##

    <p style="margin-top: 20px;">
        <a href="##PortalUrl##" style="background:#0d6efd;color:#fff;padding:10px 20px;text-decoration:none;border-radius:4px;">
            Open patient portal
        </a>
    </p>
